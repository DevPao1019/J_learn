<section id="upload-tool" style="background-color: #ffffff; padding: 40px; border: 2px solid #acfff3; border-radius: 15px; margin: 20px;">
    <h2 style="color: #ff8ade;">📤 อัปโหลดเอกสารบทเรียน (Admin Only)</h2>
    <p>เลือกไฟล์ PDF หรือรูปภาพ เพื่อส่งเข้า Google Drive โดยตรง</p>
    
    <div style="margin-top: 20px;">
        <input type="file" id="fileInput" style="padding: 10px; border: 1px solid #acfff3; border-radius: 5px;">
        <button onclick="uploadFile()" id="uploadBtn" 
            style="background-color: #fbffa4; color: #333; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Sarabun', sans-serif;">
            ยืนยันการอัปโหลด
        </button>
    </div>
    
    <p id="status" style="margin-top: 15px; font-weight: bold; color: #333;"></p>
</section>

<script>
async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const btn = document.getElementById('uploadBtn');
    const file = fileInput.files[0];
    
    if (!file) {
        alert("กรุณาเลือกไฟล์ก่อนครับ!");
        return;
    }

    // ลิงก์ Apps Script ที่คุณเพิ่งสร้างมา
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZBNSQYH1gqSUy_-6dTnjCdh42MPbsAv3clv4lQOqXbFuuk_-JzuQl6_2len9D742l/exec';

    status.innerText = "⏳ กำลังส่งไฟล์ไปที่ Google Drive...";
    btn.disabled = true;
    btn.style.opacity = "0.5";
    
    const reader = new FileReader();
    reader.onload = async function(e) {
        const base64Data = e.target.result.split(',')[1];
        const payload = {
            fileName: file.name,
            mimeType: file.type,
            fileData: base64Data
        };

        try {
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.result === 'success') {
                status.innerText = "✅ อัปโหลดสำเร็จ! ไฟล์ไปอยู่ที่ Drive แล้วครับ";
                status.style.color = "#4CAF50";
            } else {
                status.innerText = "❌ เกิดข้อผิดพลาด: " + result.error;
                status.style.color = "red";
            }
        } catch (error) {
            status.innerText = "❌ เชื่อมต่อกับระบบไม่ได้ (CORS Error หรือ URL ผิด)";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    };
    reader.readAsDataURL(file);
}
</script>
