// ─── Utilities ────────────────────────────────────────────────────────────────

function parseGSheetJSON(raw) {
  const json = JSON.parse(raw.replace(/.*?\(/, '').replace(/\);\s*$/, ''));
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(row => {
    const obj = {};
    row.c.forEach((cell, i) => { obj[cols[i]] = cell?.v ?? ''; });
    return obj;
  });
}

function getDaysUntilExpiry(dateStr) {
  if (!dateStr) return null;
  const exp = new Date(dateStr);
  const now = new Date();
  return Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
}

function MyCoursePage({ user, setUser, setActiveTab }) {
  const [studentData, setStudentData] = useState(null);
  const [content, setContent] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [openFolder, setOpenFolder] = useState(null);

  // Fetch course data from Google Sheet
  const fetchCourses = useCallback(async (email) => {
    setLoading(true);
    setError('');
    try {
      // Fetch Students sheet
      const studRes = await fetch('https://docs.google.com/spreadsheets/d/1NtBJDUtxx1QuJYu60TRGnAi4q5fJLioYqxYC_FAL7rk/gviz/tq?tqx=out:json&sheet=Students');
      const studRows = parseGSheetJSON(await studRes.text());
      const student = studRows.find(r => r.Email?.toLowerCase() === email.toLowerCase());

      if (!student) {
        setError('No course found for this account. Please contact P\' J\'Ae to enroll.');
        setLoading(false);
        return;
      }

      const purchasedCourses = student.Courses
        ? student.Courses.split(',').map(c => c.trim().toLowerCase()).filter(Boolean)
        : [];

      setStudentData({
        email: student.Email,
        courses: purchasedCourses,
        expireDate: student.ExpireDate || null,
      });

      // Fetch Content sheet
      if (purchasedCourses.length > 0) {
        const contentRes = await fetch('https://docs.google.com/spreadsheets/d/1NtBJDUtxx1QuJYu60TRGnAi4q5fJLioYqxYC_FAL7rk/gviz/tq?tqx=out:json&sheet=Content');
        const contentRows = parseGSheetJSON(await contentRes.text());
        const filtered = contentRows.filter(r => purchasedCourses.includes(r.course?.toLowerCase()));
        setContent(filtered);
      }
    } catch (e) {
      setError('Failed to load course data. Please try again.');
    }
    setLoading(false);
  }, []);

  // On mount: check for existing session
  useEffect(() => {
    if (window.netlifyIdentity) {
      const currentUser = window.netlifyIdentity.currentUser();
      if (currentUser && !user) {
        const u = { email: currentUser.email, name: currentUser.user_metadata?.full_name || currentUser.email };
        setUser(u);
      }
    }
  }, []);

  // Fetch when user is set
  useEffect(() => {
    if (user?.email) {
      fetchCourses(user.email);
    }
  }, [user?.email]);

  function handleLogin() {
    if (!window.netlifyIdentity) return;
    window.netlifyIdentity.open('login');
    window.netlifyIdentity.on('login', (u) => {
      const userData = { email: u.email, name: u.user_metadata?.full_name || u.email };
      setUser(userData);
      window.netlifyIdentity.close();
    });
  }

  function handleSignOut() {
    if (window.netlifyIdentity) {
      window.netlifyIdentity.logout();
    }
    setUser(null);
    setStudentData(null);
    setContent([]);
    setError('');
  }

  // Expiry warning
  function ExpiryBanner() {
    if (!studentData?.expireDate) return null;
    const days = getDaysUntilExpiry(studentData.expireDate);
    if (days === null || days > 30) return null;
    const danger = days <= 7;
    return (
      <div className={`expiry-warning ${danger ? 'expiry-danger' : ''}`} style={{marginBottom:20}}>
        <span style={{fontSize:20}}>{danger ? '🚨' : '⚠️'}</span>
        <span>
          {danger
            ? `Your access expires in ${days} day${days !== 1 ? 's' : ''}! Please renew soon.`
            : `Your access expires on ${studentData.expireDate} (${days} days remaining).`}
        </span>
      </div>
    );
  }

  // ── Not logged in ──
  if (!user) {
    return (
      <div className="fade-up" style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'60px 24px'}}>
        <div style={{textAlign:'center',maxWidth:480}}>
          <div className="float" style={{width:100,height:100,borderRadius:'50%',background:'linear-gradient(135deg,#ff8ade,#acfff3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:48,margin:'0 auto 28px',boxShadow:'0 8px 32px rgba(255,138,222,0.4)'}}>🎓</div>
          <span className="section-pill">My Course</span>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(1.5rem,3vw,2.2rem)',color:'#1a1a2e',margin:'16px 0 10px'}}>My Learning Space</h1>
          <p style={{color:'#888',fontSize:15,marginBottom:32,lineHeight:1.7}}>
            Sign in to access your enrolled courses<br/>and continue learning right away.
          </p>
          <button onClick={handleLogin} style={{padding:'16px 40px',borderRadius:100,background:'linear-gradient(135deg,#ff8ade,#acfff3)',border:'none',fontSize:16,fontWeight:700,color:'#1a1a2e',cursor:'pointer',fontFamily:"'Sarabun',sans-serif",boxShadow:'0 6px 20px rgba(255,138,222,0.4)',width:'100%',maxWidth:320}}>
            🔐 Sign In / Sign Up
          </button>
          <p style={{marginTop:24,fontSize:13,color:'#bbb'}}>
            Haven't purchased a course yet?{' '}
            <span onClick={() => setActiveTab('courses')} style={{color:'#c44f9a',cursor:'pointer',fontWeight:600}}>Browse courses →</span>
          </p>
        </div>
      </div>
    );
  }

  // ── Loading ──
  if (loading) {
    return (
      <div style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:20}}>
        <div className="loader"/>
        <p style={{color:'#888',fontSize:15}}>Loading your courses...</p>
      </div>
    );
  }

  // ── Error (no enrollment) ──
  if (error) {
    return (
      <div className="fade-up" style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,padding:24}}>
        <div style={{fontSize:56}}>📭</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",color:'#1a1a2e',fontSize:22}}>No Courses Found</h2>
        <p style={{color:'#888',textAlign:'center',maxWidth:380,lineHeight:1.7}}>{error}</p>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}}>
          <button onClick={() => setActiveTab('contact')} style={{padding:'12px 28px',borderRadius:100,background:'linear-gradient(135deg,#ff8ade,#acfff3)',border:'none',fontFamily:"'Sarabun',sans-serif",fontSize:15,fontWeight:700,color:'#1a1a2e',cursor:'pointer'}}>
            ✉️ Contact P' J'Ae
          </button>
          <button onClick={handleSignOut} style={{padding:'12px 28px',borderRadius:100,background:'transparent',border:'1px solid #ddd',fontSize:15,color:'#888',cursor:'pointer',fontFamily:"'Sarabun',sans-serif"}}>
            ← Sign Out
          </button>
        </div>
      </div>
    );
  }

  // ── Logged in & data loaded ──
  const purchasedIds = studentData?.courses || [];
  const unlockedCourseData = COURSE_DATA.filter(c => purchasedIds.includes(c.id));
  const lockedCourseData = COURSE_DATA.filter(c => !purchasedIds.includes(c.id));

  // Group content by folder (head)
  const grouped = content.reduce((acc, item) => {
    const key = `${item.course?.toUpperCase()} — ${item.head}`;
    if (!acc[key]) acc[key] = [];
    acc[key].push(item);
    return acc;
  }, {});

  return (
    <div className="fade-up" style={{maxWidth:1000,margin:'0 auto',padding:'40px 24px 80px'}}>

      {/* User header bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28,padding:'16px 24px',borderRadius:20,background:'linear-gradient(135deg,#ff8ade15,#acfff315)',border:'1px solid #ff8ade33',flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#ff8ade,#acfff3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>😊</div>
          <div>
            <div style={{fontWeight:700,color:'#1a1a2e'}}>{user.name}</div>
            <div style={{fontSize:13,color:'#888'}}>{user.email}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          {purchasedIds.map(id => (
            <span key={id} style={{padding:'4px 12px',borderRadius:100,background:'linear-gradient(135deg,#acfff3,#fbffa4)',fontSize:12,fontWeight:700,color:'#1a1a2e'}}>
              {id.toUpperCase()} ✓
            </span>
          ))}
          <button onClick={handleSignOut} style={{padding:'8px 18px',borderRadius:100,background:'transparent',border:'1px solid #ddd',fontSize:13,color:'#888',cursor:'pointer',fontFamily:"'Sarabun',sans-serif"}}>
            Sign out
          </button>
        </div>
      </div>

      {/* Expiry warning */}
      <ExpiryBanner />

      {/* My Content */}
      <div style={{marginBottom:40}}>
        <span className="section-pill">My Courses</span>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(1.5rem,3vw,2.2rem)',color:'#1a1a2e',marginTop:8}}>Your Learning Content</h1>
        {studentData?.expireDate && (
          <p style={{color:'#888',fontSize:14,marginTop:6}}>
            Access expires: <strong style={{color:'#c44f9a'}}>{studentData.expireDate}</strong>
          </p>
        )}
      </div>

      {/* Course content folders */}
      {Object.keys(grouped).length === 0 && purchasedIds.length > 0 ? (
        <div style={{textAlign:'center',padding:48,color:'#bbb',background:'white',borderRadius:20,border:'1px dashed #ddd',marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:12}}>📂</div>
          <p>Content will appear here once uploaded. Check back soon!</p>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:40}}>
          {Object.entries(grouped).map(([folder, items]) => (
            <div key={folder} style={{borderRadius:20,overflow:'hidden',border:'1px solid rgba(255,138,222,0.2)',background:'white'}}>
              <div onClick={() => setOpenFolder(openFolder === folder ? null : folder)} style={{padding:'16px 22px',background:'linear-gradient(135deg,#ff8ade15,#acfff315)',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:15,color:'#1a1a2e'}}>📂 {folder}</span>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'#888'}}>{items.length} videos</span>
                  <span style={{fontSize:18,transform:openFolder===folder?'rotate(180deg)':'none',transition:'transform 0.2s'}}>⌄</span>
                </div>
              </div>
              {openFolder === folder && (
                <div style={{padding:'12px 22px',display:'flex',flexDirection:'column',gap:10}}>
                  {items.map((item, i) => (
                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:14,background:'#fafafa',border:'1px solid rgba(0,0,0,0.05)',flexWrap:'wrap',gap:8}}>
                      <div>
                        <div style={{fontSize:13,color:'#888',marginBottom:2}}>{item.subHead} · Tape {item.tapeNo}</div>
                        <div style={{fontSize:15,fontWeight:600,color:'#1a1a2e'}}>{item.title}</div>
                      </div>
                      <a href={item.driveLink} target="_blank" rel="noopener noreferrer" style={{padding:'8px 20px',borderRadius:100,background:'linear-gradient(135deg,#ff8ade,#acfff3)',border:'none',fontSize:13,fontWeight:700,color:'#1a1a2e',cursor:'pointer',textDecoration:'none',whiteSpace:'nowrap',flexShrink:0}}>
                        ▶ Watch
                      </a>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Locked Courses — upsell */}
      {lockedCourseData.length > 0 && (
        <>
          <div style={{marginBottom:20}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:'#1a1a2e'}}>🔒 Other Courses</h2>
            <p style={{fontSize:14,color:'#888',marginTop:4}}>Unlock more content to accelerate your learning</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:16}}>
            {lockedCourseData.map(course => (
              <div key={course.id} style={{borderRadius:20,border:'1px solid rgba(0,0,0,0.08)',background:'white',overflow:'hidden',opacity:0.85}}>
                <div style={{height:6,background:course.grad}}/>
                <div style={{padding:24,position:'relative'}}>
                  <div style={{position:'absolute',top:16,right:16,fontSize:20}}>🔒</div>
                  <div style={{fontSize:32,marginBottom:12}}>{course.badge}</div>
                  <div style={{fontWeight:700,fontSize:16,color:'#1a1a2e',marginBottom:6}}>{course.title}</div>
                  <p style={{fontSize:13,color:'#888',marginBottom:16,lineHeight:1.6}}>{course.desc}</p>
                  <span style={{display:'inline-block',padding:'3px 10px',borderRadius:100,background:course.grad,fontSize:11,fontWeight:700,color:'#1a1a2e',marginBottom:16}}>{course.tapes}</span>
                  <button onClick={() => setActiveTab('contact')} style={{width:'100%',padding:'10px',borderRadius:100,background:'linear-gradient(135deg,#ff8ade,#acfff3)',border:'none',fontFamily:"'Sarabun',sans-serif",fontSize:14,fontWeight:700,color:'#1a1a2e',cursor:'pointer'}}>
                    🛒 Purchase to Unlock
                  </button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Contact Page ─────────────────────────────────────────────────────────────

  return (
    <div className="fade-up" style={{maxWidth:900,margin:'0 auto',padding:'60px 24px'}}>
      <div style={{textAlign:'center',marginBottom:48}}>
        <span className="section-pill">Get in Touch</span>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(1.8rem,4vw,2.8rem)',color:'#1a1a2e',marginTop:10}}>Contact Us</h1>
        <p style={{color:'#888',fontSize:16,marginTop:8}}>We're happy to answer any question 🌱</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:16,marginBottom:56}}>
        {[
          {icon:'📧',label:'Email',value:'kaewwalin@example.com',color:'#ff8ade'},
          {icon:'💬',label:'LINE ID',value:'@geojourney',color:'#acfff3'},
          {icon:'📘',label:'Facebook',value:'GeoJourney by Kaewwalin',color:'#fbffa4'},
          {icon:'📸',label:'Instagram',value:'@kaewwalin.geo',color:'#ff8ade'},
        ].map((item,i) => (
          <div key={i} className="card-hover" style={{padding:24,borderRadius:20,background:'white',border:`1px solid ${item.color}55`,boxShadow:'0 4px 16px rgba(0,0,0,0.05)',textAlign:'center',cursor:'pointer'}}>
            <div style={{width:52,height:52,borderRadius:'50%',background:`${item.color}33`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,margin:'0 auto 12px'}}>{item.icon}</div>
            <div style={{fontSize:12,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{item.label}</div>
            <div style={{fontSize:14,color:'#1a1a2e',fontWeight:600}}>{item.value}</div>
          </div>
        ))}
      </div>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:'#1a1a2e',marginBottom:24}}>❓ FAQ</h2>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {[
          {q:'Do I need prior knowledge of geography?',a:'Not at all! The TGeo Crash Course is designed to start from zero — no background needed.'},
          {q:'Do I have lifetime access after purchasing?',a:'Yes! Once enrolled, you can revisit the content anytime within your access period.'},
          {q:'Which exams is this course suitable for?',a:'TGeo (all levels), A-Level Geography, iGeo, and university entrance exams.'},
          {q:'How do I get access after purchasing?',a:'After payment, contact P\' J\'Ae with your email. Your account will be activated within 24 hours.'},
        ].map((item,i) => (
          <div key={i} style={{padding:24,borderRadius:20,background:'white',border:'1px solid rgba(255,138,222,0.2)',boxShadow:'0 4px 14px rgba(0,0,0,0.05)'}}>
            <div style={{fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:10}}>Q: {item.q}</div>
            <div style={{fontSize:14,color:'#666',lineHeight:1.7}}>A: {item.a}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

const TABS = [
  {id:'home',   label:'🌍 Home'},
  {id:'achievements', label:'🏅 Achievements'},
  {id:'courses',label:'📚 Courses'},
  {id:'mycourse',label:'🎓 My Course'},
  {id:'contact',label:'✉️ Contact'},
];

function App() {
  const [activeTab, setActiveTab] = useState('home');
  const [user, setUser] = useState(null);

  // Initialize Netlify Identity — session persistence + auto-redirect on login
  useEffect(() => {
    if (!window.netlifyIdentity) return;

    window.netlifyIdentity.on('init', (u) => {
      if (u) {
        setUser({ email: u.email, name: u.user_metadata?.full_name || u.email });
      }
    });

    window.netlifyIdentity.on('login', (u) => {
      setUser({ email: u.email, name: u.user_metadata?.full_name || u.email });
      setActiveTab('mycourse');   // ← auto-redirect after login
      window.netlifyIdentity.close();
    });

    window.netlifyIdentity.on('logout', () => {
      setUser(null);
    });

    window.netlifyIdentity.init();
  }, []);

  return (
    <div style={{minHeight:'100vh',background:'#fdfcff',fontFamily:"'Sarabun',sans-serif"}}>
      {/* Nav */}
      <nav style={{background:'rgba(255,255,255,0.88)',backdropFilter:'blur(16px)',borderBottom:'1px solid rgba(255,138,222,0.2)',position:'sticky',top:0,zIndex:100,padding:'12px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,#ff8ade,#acfff3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,boxShadow:'0 4px 12px rgba(255,138,222,0.35)'}}>🌍</div>
            <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:18,color:'#1a1a2e'}}>
              Geo<span className="grad-text">Journey</span>
            </span>
          </div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}}>
            {TABS.map(tab => (
              <button
                key={tab.id}
                className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`}
                onClick={() => setActiveTab(tab.id)}
              >
                {tab.label}
                {tab.id === 'mycourse' && user && (
                  <span style={{marginLeft:6,width:8,height:8,borderRadius:'50%',background:'#00b4a0',display:'inline-block',verticalAlign:'middle'}}/>
                )}
              </button>
            ))}
          </div>
        </div>
      </nav>

      {/* Content */}
      <main>
        {activeTab === 'home'         && <HomePage setActiveTab={setActiveTab} />}
        {activeTab === 'achievements' && <AchievementsPage />}
        {activeTab === 'courses'      && <CoursesPage />}
        {activeTab === 'mycourse'     && <MyCoursePage user={user} setUser={setUser} setActiveTab={setActiveTab} />}
        {activeTab === 'contact'      && <ContactPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
